name: Render Video

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'voiceover/**'
  workflow_dispatch:
    inputs:
      script_content:
        description: 'Paste your script here (use [MM:SS - MM:SS] format per line)'
        required: true
        type: string
      output_name:
        description: 'Output filename (no spaces, no .mp4)'
        required: false
        default: 'my-video'
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: Ensure Chrome for Remotion
        run: npx remotion browser ensure

      - name: Write API keys to .env
        run: |
          {
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"
            echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}"
            echo "FREESOUND_API_KEY=${{ secrets.FREESOUND_API_KEY }}"
            echo "PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}"
            echo "ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}"
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
          } > .env

      # --- Manual trigger ---
      - name: Write dispatched script to file
        if: github.event_name == 'workflow_dispatch'
        env:
          SCRIPT_CONTENT: ${{ github.event.inputs.script_content }}
        run: |
          mkdir -p scripts
          printf '%s' "$SCRIPT_CONTENT" > "scripts/${{ github.event.inputs.output_name }}.txt"

      - name: Run pipeline (manual)
        if: github.event_name == 'workflow_dispatch'
        run: npm start "scripts/${{ github.event.inputs.output_name }}.txt"

      # --- Push trigger ---
      - name: Detect pushed script
        if: github.event_name == 'push'
        id: detect
        run: |
          FILE=$(git show --name-only --format="" HEAD -- 'scripts/' | grep '\.txt$' | head -1)
          echo "script_file=${FILE:-scripts/example-script.txt}" >> "$GITHUB_OUTPUT"

      - name: Run pipeline (push)
        if: github.event_name == 'push'
        run: npm start "${{ steps.detect.outputs.script_file }}"

      # --- Upload both formats ---
      - name: Upload rendered videos
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 7
          if-no-files-found: error
